services:
  - type: web
    name: gita-wisdom-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_API_KEY
        sync: false
      - key: ADMIN_NAME
        value: Gita Admin
      - key: ADMIN_EMAIL
        value: gitawisdom143@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM_NAME
        value: Gita Wisdom
      - key: EMAIL_PROVIDER
        value: brevo
      - key: ALLOW_OTP_PREVIEW
        value: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: RESEND_FROM_NAME
        value: Gita Wisdom
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        value: Gita Wisdom
      - key: BREVO_TIMEOUT_MS
        value: 12000