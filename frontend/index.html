<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-om-v2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <meta name="theme-color" content="#06101E" />
      <meta name="mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-capable" content="yes" />
      <meta name="apple-mobile-web-app-status-bar-style" content="black" />
      <meta name="apple-mobile-web-app-title" content="GitaWisdom" />
      <link rel="apple-touch-icon" href="/logo-om-v2.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Ramabhadra&display=swap" rel="stylesheet">
    <title>Gita Wisdom - Devotional Learning</title>
    <style>
      .initial-loader {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #06101E;
      }
      .initial-loader img {
        width: 120px;
        height: auto;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body style="margin: 0; background-color: #06101E;">
    <div id="root">
      <div class="initial-loader">
        <img src="/logo-om-v2.png" alt="Loading Gita Wisdom..." />
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
